# Cloudflare Worker configuration for the APT binary redirect.
#
# The Worker serves repo metadata from the gh-pages origin of the main repo
# (srivasv/wispr-flow-linux) and 302-redirects .deb binary
# requests to that repo's GitHub Release assets, which sidesteps GitHub's
# 100MB per-file push cap on gh-pages (Electron builds get close).
#
# The publish layer that populates gh-pages + Releases lives in the main repo
# (ci.yml, on a v* tag). Until the first release is cut, this Worker deploys and
# binds the domain but has no package indexes to serve yet -- the deploy probe
# is 404-tolerant on the dists/ path for exactly this reason.

name = "wispr-flow-linux-apt-redirect"
main = "src/worker.js"
compatibility_date = "2026-06-04"

# Custom Domain (auto-DNS) routing. Cloudflare creates the DNS record
# automatically when this is deployed; no separate dummy A record needed.
# Requires grimwulf.dev's DNS to be managed on this Cloudflare account.
routes = [
	{ pattern = "pkg.grimwulf.dev", custom_domain = true },
]
